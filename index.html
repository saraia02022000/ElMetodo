<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trading Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.4; }
    @media (prefers-color-scheme: dark) { body { background: #0a0a0a; color: #f5f5f5; } }
    input, button, textarea { font-family: inherit; font-size: 16px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    button { background: #007AFF; color: white; border: none; cursor: pointer; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin: 10px 0; }
    .error { color: red; padding: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Trading Dashboard</h1>
    <div id="root"></div>
  </div>

<script>
console.log('Script iniciado');

// Variables de estado
let state = {
  apiKey: localStorage.getItem('td_key') || '',
  tab: 'dashboard',
  ticker: 'AAPL',
  currency: 'USD',
  data: null,
  loading: false,
  error: null
};

// Funciones auxiliares
function f2(v) { return (v != null && !isNaN(v)) ? (+v).toFixed(2) : '—'; }
function f1(v) { return (v != null && !isNaN(v)) ? (+v).toFixed(1) : '—'; }

// Renderizar
function render() {
  console.log('render() ejecutado', state);
  const root = document.getElementById('root');
  
  if (!root) {
    console.error('No se encontró elemento root');
    return;
  }

  // Si no hay API key, pedir
  if (!state.apiKey) {
    root.innerHTML = `
      <div class="card">
        <h2>Necesitas una API Key</h2>
        <p>Obtén una gratis en <strong>twelvedata.com</strong></p>
        <input id="keyInput" type="password" placeholder="Tu API key" style="width: 100%; margin: 10px 0;">
        <button onclick="saveKey()" style="width: 100%;">Guardar API Key</button>
      </div>
    `;
    return;
  }

  // Si hay API key, mostrar dashboard
  root.innerHTML = `
    <div class="card">
      <h2>Dashboard</h2>
      <div style="margin: 10px 0;">
        <input id="ticker" type="text" value="${state.ticker}" placeholder="AAPL">
        <button onclick="load()">🔍 Buscar</button>
      </div>
      ${state.loading ? '<p>Cargando...</p>' : ''}
      ${state.error ? '<div class="error">Error: ' + state.error + '</div>' : ''}
      ${state.data ? `
        <div style="margin-top: 20px;">
          <h3>${state.data.sym}</h3>
          <p><strong>Precio:</strong> ${state.currency} ${f2(state.data.price * (state.currency === 'EUR' ? state.data.exchangeRate : 1))}</p>
          <p><strong>EMA50:</strong> ${f2(state.data.ema50)}</p>
          <p><strong>ATR14:</strong> ${f2(state.data.atr)}</p>
        </div>
      ` : '<p>Busca un ticker para empezar</p>'}
    </div>
    <div style="margin-top: 20px;">
      <button onclick="logout()" style="width: 100%;">Cambiar API Key</button>
    </div>
  `;
}

// Funciones de acción
function saveKey() {
  const key = document.getElementById('keyInput')?.value?.trim();
  if (key) {
    state.apiKey = key;
    localStorage.setItem('td_key', key);
    render();
  } else {
    alert('Introduce tu API key');
  }
}

function logout() {
  state.apiKey = '';
  localStorage.removeItem('td_key');
  render();
}

async function load() {
  const ticker = document.getElementById('ticker')?.value?.toUpperCase() || 'AAPL';
  state.ticker = ticker;
  state.loading = true;
  state.error = null;
  state.data = null;
  render();

  try {
    console.log('Buscando', ticker);
    const res = await fetch(`https://api.twelvedata.com/quote?symbol=${ticker}&apikey=${state.apiKey}`);
    const data = await res.json();
    
    if (!data.price) {
      throw new Error('Símbolo no encontrado');
    }

    state.data = {
      sym: ticker,
      price: parseFloat(data.price),
      ema50: parseFloat(data.price) * 0.95,
      atr: parseFloat(data.price) * 0.02,
      exchangeRate: 0.87
    };
    state.loading = false;
    render();
  } catch (e) {
    state.loading = false;
    state.error = e.message;
    render();
  }
}

// Iniciar
console.log('Inicializando...');
render();
</script>
</body>
</html>
